# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/games_night_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Auto-create tables from your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show the SQL Spring is running (useful for debugging)
spring.jpa.show-sql=true

# App runs on port 8080 by default — leave this unless there's a conflict
server.port=8080